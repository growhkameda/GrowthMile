# GitHub Actions — GROWTH MILE のメイン CI ワークフロー
# 注意：YAML の script 内で「半角コロン＋スペース」をクォートなしで使わない（パース事故防止）

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Next.js ビルド・Lint で env 検証が走る場合のフォールバック（DB 接続は不要なフェーズ向け）
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  AUTH_SECRET: ci-placeholder-secret-at-least-32-chars
  AUTH_URL: http://localhost:3000
  NODE_ENV: development

jobs:
  lint-markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdownlint-cli
      - run: mkdir -p ci-reports && markdownlint "docs/**/*.md" | tee ci-reports/markdownlint-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: markdownlint-report
          path: ci-reports/markdownlint-report.txt

  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: mkdir -p ci-reports && npm run format:check 2>&1 | tee ci-reports/prettier-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prettier-report
          path: ci-reports/prettier-report.txt

  lint-nextjs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: mkdir -p ci-reports && npm run lint 2>&1 | tee ci-reports/eslint-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: ci-reports/eslint-report.txt

  check-ai-laziness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -e
          echo "AIによるプレースホルダーが残っていないかチェックします..."
          PATTERNS="TODO|TBD|FIXME|後で記述|ここに記述|要検討|未定|PLACEHOLDER|WIP|DRAFT"
          mkdir -p ci-reports
          if grep -R -nE "$PATTERNS" docs/ | grep -v "/ai/" | grep -v "/templates/" > ci-reports/ai-laziness-report.txt; then
            echo ""
            echo "════════════════════════════════════════"
            echo "エラー：未完成のプレースホルダーが含まれています"
            echo "════════════════════════════════════════"
            cat ci-reports/ai-laziness-report.txt
            exit 1
          fi
          echo "プレースホルダーチェック：OK" > ci-reports/ai-laziness-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-laziness-report
          path: ci-reports/ai-laziness-report.txt

  check-links:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g markdown-link-check
      - run: find docs -name "*.md" -exec markdown-link-check --quiet {} \;

  check-doc-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -e
          EXIT_CODE=0
          check_sections() {
            file="$1"; shift
            for section in "$@"; do
              if ! grep -iq "$section" "$file"; then
                echo "エラー：$file に必須セクション '$section' がありません"
                EXIT_CODE=1
              fi
            done
          }
          if [ -f "docs/agentic/mvp_requirements.md" ]; then
            check_sections "docs/agentic/mvp_requirements.md" "概要" "目的"
          fi
          if [ -f "docs/features/requirements.md" ]; then
            check_sections "docs/features/requirements.md" "概要"
          fi
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "必須セクションが不足しています。.claude/rules/docs.md のルールを確認してください。"
            exit 1
          fi
          echo "構造チェック：OK"

  generate-diagrams:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: bash scripts/generate-mermaid-diagrams.sh

  unit-test:
    runs-on: ubuntu-latest
    needs: [lint-nextjs, format-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test

  build-nextjs:
    runs-on: ubuntu-latest
    needs: [lint-nextjs, format-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  hardcoded-credentials:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -e
          CRED_PATTERNS="(password|secret|api_key|api_secret|token|private_key)\s*[:=]\s*['\"][^'\"\\$\\{]+"
          if grep -R -nEi "$CRED_PATTERNS" \
            --include="*.md" --include="*.yml" --include="*.yaml" \
            --include="*.json" --include="*.properties" \
            --exclude-dir=".git" --exclude-dir="node_modules" \
            --exclude="docker-compose.yml" --exclude="docker-compose.ci.yml" \
            --exclude="*.example" --exclude="*.sample" .; then
            echo "ハードコードされた認証情報の可能性があります"
            exit 1
          fi
          echo "認証情報チェック：OK"

  doc-quality-report:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p ci-reports
          echo "=== ドキュメント品質レポート ===" > ci-reports/doc-quality-report.txt
          echo "" >> ci-reports/doc-quality-report.txt
          echo "--- ファイル一覧 ---" >> ci-reports/doc-quality-report.txt
          find docs -name "*.md" | sort >> ci-reports/doc-quality-report.txt || true
          echo "" >> ci-reports/doc-quality-report.txt
          echo "--- 各ファイルの行数 ---" >> ci-reports/doc-quality-report.txt
          find docs -name "*.md" -exec wc -l {} \; >> ci-reports/doc-quality-report.txt || true
          TOTAL=$(find docs -name "*.md" 2>/dev/null | wc -l)
          echo "" >> ci-reports/doc-quality-report.txt
          echo "--- 総ドキュメント数：${TOTAL} ---" >> ci-reports/doc-quality-report.txt
          cat ci-reports/doc-quality-report.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: doc-quality-report
          path: ci-reports/doc-quality-report.txt

  detect-e2e:
    # ジョブレベル if では hashFiles() が使えないため、checkout 後にシェルで存在判定し
    # 結果を outputs として後続ジョブに伝搬する（GitHub Actions の式評価制約への対応）
    runs-on: ubuntu-latest
    outputs:
      has_e2e: ${{ steps.check.outputs.has_e2e }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -f "e2e/package.json" ]; then
            echo "has_e2e=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_e2e=false" >> "$GITHUB_OUTPUT"
          fi

  e2e-playwright:
    needs: [detect-e2e]
    if: |
      needs.detect-e2e.outputs.has_e2e == 'true' &&
      (github.event_name == 'pull_request' ||
       github.ref == 'refs/heads/main' ||
       github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.52.0-noble
    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ secrets.CI_DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.CI_DB_NAME }}
    env:
      DATABASE_URL: postgresql://${{ secrets.CI_DB_USER }}:${{ secrets.CI_DB_PASSWORD }}@db:5432/${{ secrets.CI_DB_NAME }}
      AUTH_URL: http://localhost:3000
      AUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET }}
      NODE_ENV: test
      CI: "true"
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p e2e/test-results e2e/playwright-report
      - run: npm ci
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npm run start -- -p 3000 > /tmp/nextjs-e2e.log 2>&1 &
      - run: |
          set -e
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Next.js アプリの起動を確認しました"
              exit 0
            fi
            if [ "$i" -eq 30 ]; then
              echo "Next.js アプリの起動に失敗しました"
              cat /tmp/nextjs-e2e.log || true
              exit 1
            fi
            echo "待機中... ($i/30)"
            sleep 5
          done
      - run: cd e2e && npm ci && cd ..
      - run: cd e2e && npx playwright test
      - if: always()
        run: |
          mkdir -p e2e/test-results
          if [ ! -f e2e/test-results/junit-results.xml ]; then
            echo '<?xml version="1.0"?><testsuites><testsuite name="fallback" tests="0"/></testsuites>' > e2e/test-results/junit-results.xml
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            e2e/test-results/
            e2e/playwright-report/

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [unit-test, build-nextjs]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    steps:
      - run: echo "Staging deployment completed（インフラ確定後に AWS CLI 等へ置換）"

  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - run: echo "Production deployment completed（インフラ確定後に AWS CLI 等へ置換）"
