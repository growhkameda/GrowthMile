default: true

# 行の長さの制限を無効化（日本語やテーブルの記述でエラーになるのを防ぐため）
MD013: false

# HTMLタグの使用を許可（表の結合などでHTMLタグを使うケースを許容）
MD033: false

# リストのインデントを2スペースに固定
MD007:
  indent: 2

# 同じ見出し文字列の複数回使用を許可（設計書で「概要」などが被るのを許容）
MD024: false

# H1 見出し必須ルールを一時的に無効化
# （既存ドキュメントとの互換性を優先し、必要に応じて後で有効化を検討）
MD041: false

# タイトルの重複(FrontmatterとH1など)を許容
MD025: false

# テーブルのカラム整列ルールを無効化（日本語全角文字環境での誤検知やズレを防ぐため）
# これ以外はAIに自動修正（--fix）させることで厳格に運用します
MD060: false
