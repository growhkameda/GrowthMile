title = "Gitleaks config for PreZen — 受託開発向けセキュリティスキャン"

# ─── グローバル許可リスト ─────────────────────────
[allowlist]
  description = "Global allowlist"
  paths = [
    '''\.test\..*''',
    '''mock.*''',
    '''\.example$''',
    '''\.sample$''',
  ]

# ─── JWT関連の秘密鍵検出 ─────────────────────────
[[rules]]
  id = "jwt-secret"
  description = "JWT Secret Key"
  regex = '''(?i)(jwt|token)[_\-]?(secret|key)\s*[:=]\s*['"][^'"]{8,}['"]'''
  tags = ["secret", "jwt"]

# ─── データベース認証情報 ─────────────────────────
[[rules]]
  id = "database-password"
  description = "Database Password"
  regex = '''(?i)(db|database|postgres|mysql|datasource)[_\-]?(pass|password)\s*[:=]\s*['"][^'"]+['"]'''
  tags = ["secret", "database"]

# ─── Spring Boot設定内の認証情報 ──────────────────
[[rules]]
  id = "spring-datasource-password"
  description = "Spring Boot Datasource Password"
  regex = '''spring\.datasource\.password\s*[:=]\s*[^$\{].+'''
  tags = ["secret", "spring"]
  [rules.allowlist]
    paths = [
      '''application-dev\.yml''',
      '''application-dev\.properties''',
    ]

# ─── APIキー・シークレット ────────────────────────
[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(api[_\-]?key|apikey|api[_\-]?secret)\s*[:=]\s*['"][^'"]{16,}['"]'''
  tags = ["secret", "api"]

# ─── AWS認証情報 ─────────────────────────────────
[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key ID"
  regex = '''(?:A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}'''
  tags = ["secret", "aws"]

# ─── プライベートキーファイル ─────────────────────
[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (?:RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----'''
  tags = ["secret", "key"]

# ─── パスワードのハードコード（汎用）──────────────
[[rules]]
  id = "hardcoded-password"
  description = "Hardcoded Password"
  regex = '''(?i)(password|passwd|pwd)\s*[:=]\s*['"][^'"$\{]{4,}['"]'''
  tags = ["secret", "password"]
  [rules.allowlist]
    paths = [
      '''application-dev\.yml''',
      '''application-dev\.properties''',
      '''docker-compose\.yml''',
    ]
